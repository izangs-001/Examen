<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#10151c"/>
  <rect x="24" y="24" width="1152" height="472" rx="18" fill="#171f29" stroke="#2d3a49"/>
  <text x="52" y="70" fill="#8bd5ca" font-family="monospace" font-size="28">Captura: proxy funcionant al port 80</text>
  <text x="52" y="118" fill="#f5f5f5" font-family="monospace" font-size="22">$ curl -I http://127.0.0.1/</text>
  <text x="52" y="168" fill="#f5f5f5" font-family="monospace" font-size="21">HTTP/1.1 200 OK</text>
  <text x="52" y="204" fill="#f5f5f5" font-family="monospace" font-size="21">Server: nginx/1.29.8</text>
  <text x="52" y="240" fill="#f5f5f5" font-family="monospace" font-size="21">Content-Type: text/html</text>
  <text x="52" y="276" fill="#ffd166" font-family="monospace" font-size="21">X-Upstream-Server: 172.18.0.2:80</text>
  <text x="52" y="312" fill="#ffd166" font-family="monospace" font-size="21">X-Upstream-Status: 200</text>
  <text x="52" y="372" fill="#8bd5ca" font-family="monospace" font-size="20">Verificació:</text>
  <text x="52" y="406" fill="#f5f5f5" font-family="monospace" font-size="20">El punt d'entrada únic és el proxy Nginx exposat al port 80.</text>
  <text x="52" y="438" fill="#f5f5f5" font-family="monospace" font-size="20">Les capçaleres indiquen quin backend ha contestat la petició.</text>
</svg>
