<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460">
  <rect width="1200" height="460" fill="#10151c"/>
  <rect x="24" y="24" width="1152" height="412" rx="18" fill="#171f29" stroke="#2d3a49"/>
  <text x="52" y="70" fill="#8bd5ca" font-family="monospace" font-size="28">Captura: balanceig de càrrega</text>
  <text x="52" y="118" fill="#f5f5f5" font-family="monospace" font-size="20">$ for i in $(seq 1 20); do curl -sD - -o /dev/null -H 'Connection: close' http://127.0.0.1/ | grep -i '^X-Upstream-Server:' | tr -d '\r'; done | sort | uniq -c</text>
  <text x="52" y="182" fill="#ffd166" font-family="monospace" font-size="26">10 X-Upstream-Server: 172.18.0.2:80</text>
  <text x="52" y="224" fill="#ffd166" font-family="monospace" font-size="26">10 X-Upstream-Server: 172.18.0.3:80</text>
  <text x="52" y="292" fill="#8bd5ca" font-family="monospace" font-size="20">Verificació:</text>
  <text x="52" y="326" fill="#f5f5f5" font-family="monospace" font-size="20">En una mostra de 20 peticions, els dos backends han respost exactament 10 vegades cadascun.</text>
  <text x="52" y="358" fill="#f5f5f5" font-family="monospace" font-size="20">El balanceig de càrrega està funcionant a través del proxy invers.</text>
</svg>
